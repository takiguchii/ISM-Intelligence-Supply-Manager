services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro,z
      - ./database/init:/docker-entrypoint-initdb.d:ro,z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ism-network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      Database__Provider: MySql
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/workspace/backend:z
      - nuget_packages:/root/.nuget/packages
    networks:
      - ism-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_API_BASE: ${NUXT_API_BASE}
      NUXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/workspace/frontend:z
      - frontend_node_modules:/workspace/frontend/node_modules
      - frontend_nuxt:/workspace/frontend/.nuxt
    networks:
      - ism-network

volumes:
  mysql_data:
  nuget_packages:
  frontend_node_modules:
  frontend_nuxt:

networks:
  ism-network:
    driver: bridge
